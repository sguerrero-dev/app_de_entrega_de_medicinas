<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido en Camino 🚚</title>
    <link rel="stylesheet" href="final.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Icono de check animado -->
            <div class="checkmark-container">
                <div class="checkmark-circle"></div>
                <div class="checkmark-check"></div>
            </div>
            
            <!-- Mensaje principal -->
            <h1 class="title">¡PEDIDO REALIZADO!</h1>
            
            <!-- Subtítulo con animación -->
            <div class="subtitle-container">
                <span class="subtitle">🚚 YA VA EN CAMINO</span>
                <div class="road-animation">
                    <div class="truck"></div>
                </div>
            </div>
            
            <!-- Detalles del pedido (opcional) -->
            <div class="details">
                <p>Tu pedido ha sido confirmado y está siendo preparado</p>
                <p class="eta">Tiempo estimado: <span class="time">30-45 min</span></p>
            </div>
            
            <!-- Botón de seguimiento -->
            <button class="track-button" onclick="alert('¡Pronto podrás seguir tu pedido en tiempo real! 📱')">
                SEGUIR PEDIDO
                <span class="button-icon">📍</span>
            </button>
        </div>
    </div>
</body>
</html>
