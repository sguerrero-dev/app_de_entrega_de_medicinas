<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Medicamento</title>
    <link rel="stylesheet" href="busqueda.css">
</head>
<body>
    <header>
        <img src="../imagenes/logo.png" alt="Logo" class="logo">
        <h1>Buscar Medicamento</h1>
        <button class="btn-volver" onclick="window.location.href='index.html'">← Volver</button>
    </header>
    
    <main>
        <!-- Buscador -->
        <div class="buscador-medicamento">
            <input type="text" id="inputMedicamento" placeholder="Buscar medicamento... (Ej: Acetaminofen 500mg)" value="Acetaminofen 500mg">
            <button onclick="buscarMedicamento()">🔍 Buscar</button>
        </div>
        
        <!-- Mensajes -->
        <div id="mensajeError" class="mensaje-error"></div>
        <div id="mensajeSuccess" class="mensaje-success"></div>
        
        <!-- Resultados de farmacias -->
        <div id="resultadosFarmacias" style="display: none;">
            <h2>Farmacias disponibles en la ciudad</h2>
            <div id="farmaciasGrid" class="farmacias-grid"></div>
        </div>
        
        <!-- Plataformas de envío (inicialmente ocultas) -->
        <div id="plataformasEnvio" class="plataformas-envio" style="display: none;">
            <h3>Elige quién te lo envía</h3>
            <div class="plataformas-grid">
                <div class="plataforma-btn" onclick="seleccionarPlataforma('didi')" id="plataforma-didi">
                    <span class="plataforma-icono">🛵</span>
                    <span class="plataforma-nombre">DiDi Food</span>
                </div>
                <div class="plataforma-btn" onclick="seleccionarPlataforma('uber')" id="plataforma-uber">
                    <span class="plataforma-icono">🚗</span>
                    <span class="plataforma-nombre">UBER EATS</span>
                </div>
                <div class="plataforma-btn" onclick="seleccionarPlataforma('rappi')" id="plataforma-rappi">
                    <span class="plataforma-icono">🦾</span>
                    <span class="plataforma-nombre">Rappi</span>
                </div>
            </div>
        </div>
        
        <!-- Botón confirmar (inicialmente oculto) -->
        <button id="btnConfirmar" class="btn-confirmar" onclick="confirmarPedido()" style="display: none;" disabled>
            ✅ Confirmar Pedido
        </button>
    </main>
    
    <footer>
        <p>Sistema de Recetas Médicas v1.0 - Búsqueda de Medicamentos</p>
    </footer>
    
    <script src="busqueda.js"></script>
</body>
</html>
